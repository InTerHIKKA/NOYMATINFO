<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Шифратор и Дешифратор</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="bg-pattern"></div> 
    <div class="container">
        <h1>RSA Инструмент</h1>
        
        <div class="box">
            <h3>Зашифровать текст</h3>
            <input type="number" id="p_val" placeholder="Число p">
            <input type="number" id="q_val" placeholder="Число q">
            <input type="text" id="word_to_encrypt" placeholder="Введите слово">
            <button onclick="encryptRSA()">Зашифровать</button>
        </div>

        <hr>

        <div class="box">
            <h3>Расшифровать числа</h3>
            <input type="text" id="numbers_to_decrypt" placeholder="Числа через запятую">
            <p style="font-size: 0.8em; color: #aaa;">Для расшифровки используйте те же p и q выше</p>
            <button onclick="decryptRSA()" style="background-color: #28a745;">Расшифровать</button>
        </div>

        <div class="result" id="result">
            Здесь будет результат...
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
